      /* Prevent white flash */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #030712; /* gray-950 */
        min-height: 100vh;
      }

      /* Initial Loader Styles */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: rgba(3, 7, 18, 0.95);
        z-index: 9999;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        transition: opacity 0.4s ease-out;
      }

      #initial-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .loader-container {
        position: relative;
        width: 128px;
        height: 128px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Spinning border */
      .loader-spinner {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 4px solid rgba(45, 212, 191, 0.7);
        border-right-color: transparent;
        border-bottom-color: transparent;
        animation: spin 1s linear infinite;
      }

      /* Inner ring */
      .loader-inner-ring {
        position: absolute;
        inset: 4px;
        border-radius: 50%;
        border: 4px solid rgba(31, 41, 55, 0.5);
      }

      /* Logo image */
      .loader-image {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        object-fit: cover;
        animation: pulse 2s ease-in-out infinite;
      }

      /* Loading text */
      .loader-text {
        margin-top: 32px;
        font-size: 18px;
        color: white;
        letter-spacing: 0.05em;
        opacity: 0.8;
      }

      /* Animations */
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.95); }
      }
